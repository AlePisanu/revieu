<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Revieu</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      font-size: 14px;
      color: #1f2328;
      padding: 16px;
    }

    h1 {
      font-size: 18px;
      margin-bottom: 16px;
    }

    .field {
      margin-bottom: 12px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 600;
      color: #656d76;
      margin-bottom: 4px;
    }

    input {
      width: 100%;
      padding: 8px 10px;
      border: 1px solid #d1d5db;
      border-radius: 6px;
      font-size: 13px;
    }

    input:focus {
      outline: 2px solid #0969da;
      outline-offset: -1px;
    }

    .hint {
      font-size: 11px;
      color: #656d76;
      margin-top: 4px;
    }

    .hint a {
      color: #0969da;
    }

    button {
      width: 100%;
      padding: 10px;
      background: #238636;
      color: #ffffff;
      border: none;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      margin-top: 8px;
    }

    button:hover { background: #2ea043; }

    .status {
      text-align: center;
      font-size: 13px;
      margin-top: 8px;
      color: #238636;
      min-height: 20px;
    }
  </style>
</head>
<body>
  <h1>Revieu</h1>

  <div class="field">
    <label for="anthropic-key">Anthropic API Key</label>
    <input type="password" id="anthropic-key" placeholder="sk-ant-...">
    <p class="hint">Get one at <a href="https://console.anthropic.com/settings/keys" target="_blank">console.anthropic.com</a></p>
  </div>

  <div class="field">
    <label for="gemini-key">Gemini API Key</label>
    <input type="password" id="gemini-key" placeholder="AI...">
    <p class="hint">Free, no billing — <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a></p>
  </div>

  <div class="field">
    <label for="github-token">GitHub Token <span style="font-weight:400;color:#656d76">(optional)</span></label>
    <input type="password" id="github-token" placeholder="ghp_...">
    <p class="hint">Required for private repos in Full context mode. Needs <code>repo</code> scope — <a href="https://github.com/settings/tokens/new?scopes=repo" target="_blank">create one here</a></p>
  </div>

  <button id="save-btn">Save</button>
  <p class="status" id="status"></p>

  <script src="popup.js"></script>
</body>
</html>
