<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Revieu</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* ===== THEME TOKENS ===== */
    :root {
      --popup-bg: #ffffff;
      --popup-text: #0f172a;
      --popup-text-secondary: #475569;
      --popup-text-muted: #64748b;
      --popup-text-accent: #6366f1;

      --popup-input-bg: #ffffff;
      --popup-input-border: #e2e8f0;
      --popup-input-placeholder: #94a3b8;
      --popup-input-focus-border: #6366f1;
      --popup-input-focus-ring: rgba(99, 102, 241, 0.12);

      --popup-btn-bg: #0f172a;
      --popup-btn-text: #ffffff;
      --popup-btn-hover: #1e293b;

      --popup-status-color: #16a34a;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --popup-bg: #0f172a;
        --popup-text: #e2e8f0;
        --popup-text-secondary: #94a3b8;
        --popup-text-muted: #64748b;
        --popup-text-accent: #818cf8;

        --popup-input-bg: #1e293b;
        --popup-input-border: #334155;
        --popup-input-placeholder: #64748b;
        --popup-input-focus-border: #818cf8;
        --popup-input-focus-ring: rgba(129, 140, 248, 0.2);

        --popup-btn-bg: #e2e8f0;
        --popup-btn-text: #0f172a;
        --popup-btn-hover: #cbd5e1;

        --popup-status-color: #4ade80;
      }
    }

    body {
      width: 320px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: var(--popup-text);
      padding: 18px;
      background: var(--popup-bg);
    }

    /* HEADER */
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 18px;
      letter-spacing: -0.2px;
    }

    /* FIELD */
    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: var(--popup-text-secondary);
      margin-bottom: 6px;
    }

    /* INPUT */
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid var(--popup-input-border);
      border-radius: 8px;
      font-size: 13px;
      color: var(--popup-text);
      background: var(--popup-input-bg);
      transition: all 0.15s ease;
    }

    input::placeholder {
      color: var(--popup-input-placeholder);
    }

    input:hover {
      border-color: var(--popup-input-focus-border);
    }

    input:focus {
      outline: none;
      border-color: var(--popup-input-focus-border);
      box-shadow: 0 0 0 3px var(--popup-input-focus-ring);
    }

    /* HINT */
    .hint {
      font-size: 11px;
      color: var(--popup-text-muted);
      margin-top: 6px;
      line-height: 1.4;
    }

    .hint a {
      color: var(--popup-text-accent);
      text-decoration: none;
      font-weight: 500;
    }

    .hint a:hover {
      text-decoration: underline;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 11px;
      margin-top: 10px;

      background: var(--popup-btn-bg);
      color: var(--popup-btn-text);

      border: none;
      border-radius: 8px;

      font-size: 14px;
      font-weight: 500;

      cursor: pointer;
      transition: all 0.15s ease;
    }

    button:hover {
      background: var(--popup-btn-hover);
    }

    button:active {
      transform: scale(0.98);
    }

    /* STATUS */
    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 10px;
      color: var(--popup-status-color);
      min-height: 18px;
    }

    .revieu-logo-popup {
      width: 100px;
      height: auto;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <img src="../icons/logo-text.png" alt="Revieu" class="revieu-logo-popup" />
  
  <div class="field">
    <label for="anthropic-key">Anthropic API Key</label>
    <input type="password" id="anthropic-key" placeholder="sk-ant-...">
    <p class="hint">Get one at <a href="https://console.anthropic.com/settings/keys"
        target="_blank">console.anthropic.com</a> (no free plan for APIs)</p>
  </div>

  <div class="field">
    <label for="gemini-key">Gemini API Key</label>
    <input type="password" id="gemini-key" placeholder="AI...">
    <p class="hint">Free, no billing — <a href="https://aistudio.google.com/app/apikey"
        target="_blank">aistudio.google.com</a></p>
  </div>

  <div class="field">
    <label for="github-token">GitHub Token <span style="font-weight:400;color:var(--popup-text-muted)">(optional)</span></label>
    <input type="password" id="github-token" placeholder="ghp_...">
    <p class="hint">Required for private repos in Full context mode. Needs <code>repo</code> scope — <a
        href="https://github.com/settings/tokens/new?scopes=repo" target="_blank">create one here</a></p>
  </div>

  <button id="save-btn">Save</button>
  <p class="status" id="status"></p>

  <script src="popup.js"></script>
</body>

</html>
