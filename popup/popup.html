<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Revieu</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      width: 320px;
      font-family: Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      font-size: 14px;
      color: #0f172a;
      padding: 18px;
      background: #ffffff;
    }

    /* HEADER */
    h1 {
      font-size: 18px;
      font-weight: 600;
      margin-bottom: 18px;
      letter-spacing: -0.2px;
    }

    /* FIELD */
    .field {
      margin-bottom: 16px;
    }

    label {
      display: block;
      font-size: 12px;
      font-weight: 500;
      color: #475569;
      margin-bottom: 6px;
    }

    /* INPUT */
    input {
      width: 100%;
      padding: 10px 12px;
      border: 1px solid #e2e8f0;
      border-radius: 8px;
      font-size: 13px;
      background: #ffffff;
      transition: all 0.15s ease;
    }

    input::placeholder {
      color: #94a3b8;
    }

    input:hover {
      border-color: #cbd5f5;
    }

    input:focus {
      outline: none;
      border-color: #6366f1;
      box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.12);
    }

    /* HINT */
    .hint {
      font-size: 11px;
      color: #64748b;
      margin-top: 6px;
      line-height: 1.4;
    }

    .hint a {
      color: #6366f1;
      text-decoration: none;
      font-weight: 500;
    }

    .hint a:hover {
      text-decoration: underline;
    }

    /* BUTTON */
    button {
      width: 100%;
      padding: 11px;
      margin-top: 10px;

      background: #0f172a;
      color: #ffffff;

      border: none;
      border-radius: 8px;

      font-size: 14px;
      font-weight: 500;

      cursor: pointer;
      transition: all 0.15s ease;
    }

    button:hover {
      background: #1e293b;
    }

    button:active {
      transform: scale(0.98);
    }

    /* STATUS */
    .status {
      text-align: center;
      font-size: 12px;
      margin-top: 10px;
      color: #16a34a;
      min-height: 18px;
    }

    .revieu-logo-popup {
      width: 100px;
      height: auto;
      margin-bottom: 10px;
    }
  </style>
</head>

<body>
  <img src="../icons/logo-text.png" alt="Revieu" class="revieu-logo-popup" />
  
  <div class="field">
    <label for="anthropic-key">Anthropic API Key</label>
    <input type="password" id="anthropic-key" placeholder="sk-ant-...">
    <p class="hint">Get one at <a href="https://console.anthropic.com/settings/keys"
        target="_blank">console.anthropic.com</a></p>
  </div>

  <div class="field">
    <label for="gemini-key">Gemini API Key</label>
    <input type="password" id="gemini-key" placeholder="AI...">
    <p class="hint">Free, no billing — <a href="https://aistudio.google.com/app/apikey"
        target="_blank">aistudio.google.com</a></p>
  </div>

  <div class="field">
    <label for="github-token">GitHub Token <span style="font-weight:400;color:#656d76">(optional)</span></label>
    <input type="password" id="github-token" placeholder="ghp_...">
    <p class="hint">Required for private repos in Full context mode. Needs <code>repo</code> scope — <a
        href="https://github.com/settings/tokens/new?scopes=repo" target="_blank">create one here</a></p>
  </div>

  <button id="save-btn">Save</button>
  <p class="status" id="status"></p>

  <script src="popup.js"></script>
</body>

</html>
